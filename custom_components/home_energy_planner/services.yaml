solis_apply_slots:
  name: Apply Solis slot tables
  description: >-
    Diff-based write of the Solis charge/discharge slot tables. Only changed
    fields are written (disables first, enables last), each write is retried,
    and the result is verified immediately plus again after a delay to catch
    device-side reverts. Runs validation and cross-side wall-clock overlap
    checks before touching the inverter.
  fields:
    charge_slots:
      name: Charge slots
      description: List of up to 6 slots ({time, enabled, current, soc}); missing slots become disabled 00:00-00:00.
      required: false
      selector:
        object:
    discharge_slots:
      name: Discharge slots
      description: List of up to 6 slots ({time, enabled, current, soc}); missing slots become disabled 00:00-00:00.
      required: false
      selector:
        object:
    dry_run:
      name: Dry run
      description: Plan and return the write ops without executing them.
      required: false
      default: false
      selector:
        boolean:
    allow_cross_side_overlap:
      name: Allow cross-side overlap
      description: Permit charge and discharge windows that collide in wall-clock time (probing only).
      required: false
      default: false
      selector:
        boolean:
    reverify_delay_seconds:
      name: Re-verify delay
      description: Seconds until the delayed second verification pass (0 disables it).
      required: false
      default: 180
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: s

solis_read_slots:
  name: Read Solis slot tables
  description: Return the current charge/discharge slot tables and any cross-side wall-clock overlaps.

simulate_plan:
  name: Simulate battery plan
  description: >-
    Run the real battery solve/compile path on supplied inputs and return the
    dispatch plan plus compiled slot tables. Writes nothing. Anything omitted
    falls back to live data: the current price horizon, the 7-day load
    baseline, the solar forecast, and the current battery state.
  fields:
    prices:
      name: Prices
      description: Quarter-hour all-in prices in cents/kWh. Omit to use the live price horizon.
      required: false
      selector:
        object:
    start:
      name: Start
      description: ISO start time of the first price period (used only with an explicit price series; defaults to the current quarter).
      required: false
      selector:
        text:
    load:
      name: Load
      description: Load kWh per quarter-hour, a single number or a list (shorter lists are padded with the last value). Omit for the 7-day baseline.
      required: false
      selector:
        object:
    export_prices:
      name: Export prices
      description: Export compensation in cents/kWh, a single number or a list. Omit for the live export contract (plain spot by default); with an explicit price series it defaults to 0.
      required: false
      selector:
        object:
    solar:
      name: Solar
      description: Solar kWh per quarter-hour, a single number or a list. Omit for the live forecast series.
      required: false
      selector:
        object:
    soc_pct:
      name: Battery SOC
      description: Starting state of charge percent. Omit for the live value.
      required: false
      selector:
        number:
          min: 0
          max: 100
    reserve_soc_pct:
      name: Reserve SOC
      description: Reserve floor percent. Omit for the live value.
      required: false
      selector:
        number:
          min: 0
          max: 100
    capacity_kwh:
      name: Capacity
      description: Battery capacity kWh override.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.01
    max_charge_current:
      name: Max charge current
      description: Ampere override.
      required: false
      selector:
        number:
          min: 0
          max: 100
    max_discharge_current:
      name: Max discharge current
      description: Ampere override.
      required: false
      selector:
        number:
          min: 0
          max: 100

backtest:
  name: Backtest planner against recorded history
  description: >-
    Replay the last N full days through the planner using recorder statistics
    for load and solar plus historical Nord Pool prices. Reports baseline
    (no battery) vs planned (perfect-foresight dispatch) vs actual cost per
    day. Read-only; this is the ADR 0009 pre-control gate report.
  fields:
    days:
      name: Days
      description: Number of full days to replay, ending yesterday.
      required: false
      default: 30
      selector:
        number:
          min: 1
          max: 60
    load_entity:
      name: Load entity
      description: Power or energy entity for house load. Defaults to the configured load entity.
      required: false
      selector:
        entity:
    solar_entity:
      name: Solar entity
      description: Power or energy entity for solar actuals.
      required: false
      selector:
        entity:
    grid_import_entity:
      name: Grid import entity
      description: Power or energy entity for actual grid import (actual-cost column). Defaults to the daily grid energy purchased counter.
      required: false
      selector:
        entity:
    initial_soc_pct:
      name: Initial SOC
      description: State of charge at the start of the first day. Defaults to the reserve floor.
      required: false
      selector:
        number:
          min: 0
          max: 100

set_mode:
  name: Set module mode
  description: Switch a planner module between off, observe, and control (reloads the integration).
  fields:
    module:
      name: Module
      description: Which planner module to switch. versati_cooling is the hydronic cooling rollout stage (off/notify/control).
      required: true
      selector:
        select:
          options: ["battery", "climate", "water_heater", "ilp", "versati_cooling"]
    mode:
      name: Mode
      description: off computes nothing, observe publishes without writing, control also writes to the device. For versati_cooling use off/notify/control.
      required: true
      selector:
        select:
          options: ["off", "observe", "notify", "control"]

versati_cool_trial:
  name: Versati hydronic cooling trial
  description: >-
    Bounded trial of slab cooling: switches the Versati to cool mode at a
    dew-point-guarded water target, auto-reverts to heat after the given
    duration, and sends start/finish notifications. Watch the pannuhuone
    manifold and exposed pipes for condensation during the run.
  fields:
    minutes:
      name: Duration
      description: Trial length before auto-revert (10-240 minutes).
      required: false
      default: 60
      selector:
        number:
          min: 10
          max: 240
          unit_of_measurement: min
    water_temp:
      name: Water target
      description: Chilled-water target C; the room dew point + 2 C floor always applies.
      required: false
      selector:
        number:
          min: 14
          max: 25
          step: 0.5

health_check:
  name: Planner health check
  description: >-
    Run the self-monitoring checks on demand and return the snapshot and
    any active issues (stale prices, dead input sensors, failing inverter
    applies, LP engine fallback). The same checks run automatically twice
    an hour and notify once per issue per day.
